[workspace]
members = ["crates/cli", "crates/uzu"]
resolver = "3"

[workspace.package]
version = "0.1.6"
edition = "2024"
license = "MIT"
authors = ["Mirai Tech <https://trymirai.com>"]
repository = "https://github.com/trymirai/uzu"

[workspace.dependencies]
# Shared dependencies
clap = { version = "4.5.51", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }

# CLI-specific
ctrlc = "3.5.1"
indicatif = "0.18.2"
inquire = "0.9.1"
console = "0.16.1"
rocket = { version = "0.5.1", features = ["json"] }
tokio = { version = "1.48.0", features = ["full"] }
uuid = { version = "1.18.1", features = ["v4"] }

# Uzu-specific
half = { version = "2.7.1", features = ["bytemuck", "num-traits"] }
ndarray = "0.17.1"
serde_json = "1.0.145"
thiserror = "2.0.17"
tokenizers = "0.22.1"
mpsgraph = "0.2.0"
objc2 = "0.6.3"
objc2-foundation = "0.3.2"
metal = "0.32.0"
bytemuck = "1.24.0"
num-traits = "0.2.19"
regex = "1.12.2"
libc = "0.2.177"
bitflags = "2.10.0"
minijinja = "2.12.0"
minijinja-contrib = { version = "2.12.0", features = ["pycompat"] }
rand = "0.9.2"
sysinfo = "0.37.2"

# Dev dependencies
is_close = "0.1.3"
serde_json5 = "0.2.1"

# Workspace members
uzu = { path = "crates/uzu" }

[profile.release]
lto = true

[profile.test]
inherits = "release"
