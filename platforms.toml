[envs]
MACOSX_DEPLOYMENT_TARGET = "26.4"
IPHONEOS_DEPLOYMENT_TARGET = "26.4"
XROS_DEPLOYMENT_TARGET = "26.4"
TVOS_DEPLOYMENT_TARGET = "26.4"
WATCHOS_DEPLOYMENT_TARGET = "26.4"

[tools]
# Please make sure to use compatible versions of the cargo-swift / uniffi pair.
# See: https://github.com/antoniusnaumann/cargo-swift?tab=readme-ov-file#installing-for-a-different-uniffi-version
swift = { provider = "cargo", version = "0.11.0" }
zigbuild = { provider = "cargo", version = "0.22.3" }
xwin = { provider = "cargo", version = "0.22.0" }
ziglang = { provider = "uv", version = "0.16.0" }
maturin = { provider = "uv", version = "1.13.1" }

[targets."aarch64-apple-darwin"]
backend = "metal"
aliases = ["apple", "macos"]
capabilities_supported = ["grammar", "tracing"]
capabilities_default = ["grammar"]
required_envs = ["MACOSX_DEPLOYMENT_TARGET"]

[targets."x86_64-apple-darwin"]
backend = "cpu"
aliases = ["apple", "macos-intel"]
capabilities_supported = ["grammar"]
capabilities_default = ["grammar"]
required_envs = ["MACOSX_DEPLOYMENT_TARGET"]

[targets."aarch64-apple-ios"]
backend = "metal"
aliases = ["apple", "ios"]
capabilities_supported = ["grammar", "tracing"]
capabilities_default = ["grammar"]
required_envs = ["IPHONEOS_DEPLOYMENT_TARGET"]

[targets."aarch64-apple-ios-sim"]
backend = "metal"
aliases = ["apple", "ios-sim", "ios-simulator"]
capabilities_supported = ["grammar", "tracing"]
capabilities_default = ["grammar"]
required_envs = ["IPHONEOS_DEPLOYMENT_TARGET"]

[targets."aarch64-unknown-linux-gnu"]
backend = "cpu"
aliases = ["linux"]
capabilities_supported = ["grammar"]
capabilities_default = ["grammar"]

[targets."x86_64-unknown-linux-gnu"]
backend = "cpu"
aliases = ["linux"]
capabilities_supported = ["grammar"]
capabilities_default = ["grammar"]

[targets."aarch64-pc-windows-msvc"]
backend = "cpu"
aliases = ["windows"]
capabilities_supported = ["grammar"]
capabilities_default = ["grammar"]

[targets."x86_64-pc-windows-msvc"]
backend = "cpu"
aliases = ["windows"]
capabilities_supported = ["grammar"]
capabilities_default = ["grammar"]

[targets."wasm32-wasip1-threads"]
backend = "cpu"
aliases = ["wasm"]
capabilities_supported = []
capabilities_default = []

[languages.rust]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-apple-ios-sim",
    "wasm32-wasip1-threads",
]
tools = ["ziglang", "zigbuild", "xwin"]
bindings = []
examples_path = "crates/uzu/examples"
metadata = { image_url = "https://artifacts.trymirai.com/social/github/uzu-header.jpg", badges = [
    "discord",
    "email",
    "docs",
    "license",
    "build",
    "python",
    "python_package",
    "python_downloads",
    "python_version",
    "typescript",
    "typescript_package",
    "typescript_downloads",
    "swift",
    "swift_spm",
    "swift_platforms",
    "swift_version",
] }

[languages.python]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
tools = ["ziglang", "zigbuild", "xwin", "maturin"]
bindings = ["pyo3"]
examples_path = "bindings/python/examples"
metadata = { image_url = "https://artifacts.trymirai.com/social/github/uzu-python.jpg", badges = [
    "discord",
    "email",
    "docs",
    "license",
    "build",
    "python",
    "python_package",
    "python_downloads",
    "python_version",
] }

[languages.swift]
targets = ["aarch64-apple-darwin", "aarch64-apple-ios", "aarch64-apple-ios-sim"]
tools = ["swift"]
bindings = ["uniffi"]
examples_path = "bindings/swift/Sources/Examples"
metadata = { image_url = "https://artifacts.trymirai.com/social/github/uzu-swift-header.jpg", badges = [
    "discord",
    "email",
    "docs",
    "license",
    "build",
    "swift",
    "swift_spm",
    "swift_platforms",
    "swift_version",
] }

[languages.typescript]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
tools = ["ziglang", "zigbuild", "xwin"]
bindings = ["napi"]
examples_path = "bindings/typescript/examples"
metadata = { image_url = "https://artifacts.trymirai.com/social/github/uzu-typescript.jpg", badges = [
    "discord",
    "email",
    "docs",
    "license",
    "build",
    "typescript",
    "typescript_package",
    "typescript_downloads",
] }

