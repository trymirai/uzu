[advisories]
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error is unmaintained
    "RUSTSEC-2024-0436", # paste - no longer maintained
    "RUSTSEC-2024-0375", # `atty` is unmaintained
    "RUSTSEC-2025-0057", # fxhash - no longer maintained
    "RUSTSEC-2024-0384", # instant is unmaintained
    "RUSTSEC-2025-0012", # backoff is unmaintained
    "RUSTSEC-2026-0104", # reachable panic in certificate revocation list parsing
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Apache-2.0",
    "MPL-2.0",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "NCSA",
]

[bans]
multiple-versions = "allow"
