name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, macos, mac, arm64]
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Capture pre-release main HEAD
        id: head-commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate version
        run: |
          set -euo pipefail
          git fetch --tags origin

          # 1. Tag must not already exist (locally or on origin)
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null \
             || git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; then
            echo "Tag ${VERSION} already exists"; exit 1
          fi

          # 2. New version must be greater than every existing tag (semver-aware sort)
          latest=$(git tag --list | sort -V | tail -n1 || true)
          if [ -n "$latest" ]; then
            highest=$(printf '%s\n%s\n' "$latest" "${VERSION}" | sort -V | tail -n1)
            if [ "$highest" != "${VERSION}" ] || [ "$latest" = "${VERSION}" ]; then
              echo "Version ${VERSION} is not greater than latest tag $latest"; exit 1
            fi
            echo "Bumping ${latest} -> ${VERSION}"
          else
            echo "No previous tags; ${VERSION} is the first release"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup
        run: cargo tools setup

      - name: Install language tools
        run: |
          cargo tools install rust
          cargo tools install python
          cargo tools install swift
          cargo tools install typescript

      - name: Sync
        run: cargo tools sync

      - name: Build release artifacts
        run: cargo tools release "${VERSION}"

      # ---------------------------------------------------------------
      # Verify main hasn't advanced while we were building.
      # If it has, abort before publishing or pushing tags.
      # ---------------------------------------------------------------
      - name: Verify main has not advanced
        run: |
          git fetch origin main
          remote=$(git rev-parse origin/main)
          local="${{ steps.head-commit.outputs.sha }}"
          if [ "$remote" != "$local" ]; then
            echo "main advanced from $local to $remote during the run; aborting"; exit 1
          fi

      # ---------------------------------------------------------------
      # Upload platform snippets
      # ---------------------------------------------------------------
      - name: Decode platform bucket credentials
        run: |
          echo "${{ secrets.PLATFORM_BUCKET_BASE64_CREDENTIALS }}" | base64 -d > "$RUNNER_TEMP/gcloud/platform.json"
          echo "PLATFORM_CREDENTIALS=$RUNNER_TEMP/gcloud/platform.json" >> "$GITHUB_ENV"

      - name: Authenticate to GCS (platform bucket)
        uses: google-github-actions/auth@v2
        with:
          credentials_json_path: ${{ env.PLATFORM_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload platform snippets
        run: |
          gsutil -m rsync -r -d workspace/release/platform \
            "gs://platform-bucket-0485e11/snippets"

      # ---------------------------------------------------------------
      # Upload Swift xcframework zip to artifacts bucket
      # ---------------------------------------------------------------
      - name: Decode artifacts bucket credentials
        run: |
          mkdir -p "$RUNNER_TEMP/gcloud"
          echo "${{ secrets.ARTIFACTS_BUCKET_BASE64_CREDENTIALS }}" | base64 -d > "$RUNNER_TEMP/gcloud/artifacts.json"
          echo "ARTIFACTS_CREDENTIALS=$RUNNER_TEMP/gcloud/artifacts.json" >> "$GITHUB_ENV"

      - name: Authenticate to GCS (artifacts bucket)
        uses: google-github-actions/auth@v2
        with:
          credentials_json_path: ${{ env.ARTIFACTS_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload Swift xcframework
        run: |
          set -euo pipefail
          GS_URI="gs://artifacts-bucket-cd05ceb/uzu-swift/releases/${VERSION}.zip"
          if gsutil -q stat "$GS_URI"; then
            echo "Release zip already exists at $GS_URI"; exit 1
          fi
          gsutil cp "workspace/release/swift-spm/${VERSION}.zip" "$GS_URI"

      # ---------------------------------------------------------------
      # Publish npm package
      # ---------------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: workspace/release/typescript-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      # ---------------------------------------------------------------
      # Publish PyPI wheels
      # ---------------------------------------------------------------
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish workspace/release/python-pypi/*.whl

      # ---------------------------------------------------------------
      # Sync docs into trymirai/docs repo
      # ---------------------------------------------------------------
      - name: Generate GitHub App token for docs repo
        id: docs-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: trymirai
          repositories: docs

      - name: Checkout docs repo
        uses: actions/checkout@v6
        with:
          repository: trymirai/docs
          ref: main
          token: ${{ steps.docs-token.outputs.token }}
          path: docs-repo
          persist-credentials: false

      - name: Sync generated docs into docs repo
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude '.git' --exclude '.git/*' \
            workspace/release/docs/ docs-repo/snippets/generated/

      - name: Commit and push docs changes
        env:
          GH_TOKEN: ${{ steps.docs-token.outputs.token }}
        run: |
          set -euo pipefail
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m "Release ${VERSION}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/trymirai/docs.git"
            git push origin HEAD:main
          fi

      # ---------------------------------------------------------------
      # Commit changes generated by sync + release, tag, push.
      # The tag is attached to the commit this pipeline produces.
      # ---------------------------------------------------------------
      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release ${VERSION}"
          fi
          git tag "${VERSION}"
          git push origin HEAD:main
          git push origin "${VERSION}"
