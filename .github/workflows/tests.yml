name: "Tests"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    # For pipefail - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
    shell: bash

jobs:
  linters:
    name: linters
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
      - id: setup
        uses: ./.github/actions/setup
        with:
          linters: true
          metal: true

      - name: Check backend-uzu rustfmt discovery
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: RUSTUP_TOOLCHAIN=nightly ./scripts/check-rustfmt-discovery.sh

      - name: Check Rust formatting
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: cargo +nightly fmt --check

      - name: Check Rust formatting (mirai app)
        if: ${{ always() && steps.setup.outcome == 'success' }}
        working-directory: apps/mirai
        run: cargo +nightly fmt --all --check

      - name: Check Metal formatting
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: ./scripts/clang-format.sh --check

      - name: Lint with clippy
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: cargo +nightly clippy --workspace --all-targets -- -D warnings

      - name: Lint mirai app with clippy
        if: ${{ always() && steps.setup.outcome == 'success' }}
        working-directory: apps/mirai
        run: cargo +nightly clippy --workspace --all-targets -- -D warnings

      - name: Check that Cargo.lock is consistent with Cargo.toml
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: |
          cargo metadata --locked --format-version=1 > /dev/null
          git diff --exit-code -- Cargo.lock

      - name: Check with cargo-deny
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: cargo deny check -D warnings

      - name: Check sync
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: cargo tools sync --check

  tests:
    name: ${{ matrix.backend }}
      ${{ matrix.host == 'linux' && ' (linux)' || '' }}
      ${{ matrix.grammar && ' (grammar)' || '' }}
      ${{ matrix.target != '' && format(' ({0})', matrix.target) || '' }}
    runs-on: ${{ matrix.host == 'linux' && 'ubuntu-latest' || fromJSON('["self-hosted","macos","arm64"]') }}

    strategy:
      matrix:
        backend: [ 'cpu', 'metal' ]
        host: [ 'macos' ]
        target: [ '' ]
        include:
          - grammar: true
          - backend: 'cpu'
            host: 'macos'
            target: 'wasm32-wasip1-threads'
            grammar: false
          - backend: 'cpu'
            host: 'linux'
            target: ''
            grammar: false

    env:
      CARGO_ENCODED_RUSTFLAGS: "-Dwarnings"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      FEATURE_FLAGS: >-
        ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
        ${{ matrix.backend != 'cpu' && format('--features {0}', matrix.backend) || '' }}
        ${{ matrix.grammar && '--features grammar' || '' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          metal: ${{ matrix.backend == 'metal' }}
          test_data: ${{ matrix.host != 'linux' }}
          nextest: ${{ matrix.host != 'linux' }}
          target: ${{ matrix.target }}
          linux: ${{ matrix.host == 'linux' }}

      - name: Build crates
        run: cargo +stable build --no-default-features $FEATURE_FLAGS ${{ matrix.target == 'wasm32-wasip1-threads' && '-p uzu' || '' }} ${{ matrix.host == 'linux' && '-p cli --features backend-cpu,capability-cli' || '' }}

      # Temporary step to check crates that migrated to wasm.
      # New value to matrix was not added intentionally because the whole project is not wasm supported.
      - name: Build wasm supported crates
        if: ${{ matrix.target == 'wasm32-wasip1-threads' }}
        run: |
          rustup +stable target add wasm32-unknown-unknown
          cargo +stable build -p kiban --target wasm32-unknown-unknown

      - name: Build benches
        if: ${{ matrix.backend != 'cpu' }}
        run: cargo +nightly bench --no-run --no-default-features $FEATURE_FLAGS

      - name: Run tests
        if: ${{ matrix.backend != 'cpu' && matrix.grammar || matrix.backend == 'cpu' && !matrix.grammar && matrix.target == 'wasm32-wasip1-threads' }}
        run: |
          cargo +nightly nextest run --profile=ci --no-default-features $FEATURE_FLAGS \
            ${{ matrix.target == 'wasm32-wasip1-threads' && '-p backend-uzu backends::common::kernel::tests --lib' || '' }}

  validate-bindings:
    name: validate-bindings
    runs-on: [ self-hosted, macos, arm64 ]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          metal: true
          bindings: true

      - name: "Reset existing rustup toolchains on self-hosted runner"
        run: |
          if command -v rustup >/dev/null; then
            rustup toolchain uninstall stable 2>/dev/null || true
            rustup toolchain uninstall nightly 2>/dev/null || true
          fi

      - name: "Setup"
        run: |
          cargo tools setup
          cargo tools install rust
          cargo tools install python
          cargo tools install swift
          cargo tools install typescript

      - name: "Verify"
        run: |
          cargo tools verify

      - name: "Test"
        run: |
          cargo tools test python
          cargo tools test swift
          cargo tools test typescript

  completed:
    name: completed
    runs-on: ubuntu-latest
    needs: [ linters, tests, validate-bindings ]
    if: ${{ always() }}

    steps:
      - run: |
          [ "${{ needs.linters.result }}" = success ]
          [ "${{ needs.tests.result }}" = success ]
          [ "${{ needs.validate-bindings.result }}" = success ]
