name: setup
description: Setup dependencies

inputs:
  linters:
    description: "Install linters"
    required: false
    default: 'false'
  metal:
    description: "Install metal toolchain"
    required: false
    default: 'false'
  test_data:
    description: "Download test data"
    required: false
    default: 'false'
  nextest:
    description: "Install nextest"
    required: false
    default: 'false'
  target:
    description: "Additional Rust target to install"
    required: false
    default: ''
  bindings:
    description: "Install bindings requirements"
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.target }}

    - uses: dtolnay/rust-toolchain@nightly
      with:
        targets: ${{ inputs.target }}
        components: ${{ inputs.linters == 'true' && 'rustfmt,clippy' || '' }}

    - if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      shell: bash

    # TODO: drop wasi when pure was is done and switch to latest
    - if: inputs.target == 'wasm32-wasip1-threads'
      uses: bytecodealliance/actions/wasmtime/setup@v1
      with:
        version: "46.0.0"

    - if: inputs.linters == 'true'
      run: |
        arch -arm64 brew install clang-format cargo-deny
      shell: bash

    - if: inputs.metal == 'true'
      run: |
        arch -arm64 brew install cmake
        xcodebuild -downloadComponent MetalToolchain
      shell: bash

    - if: inputs.nextest == 'true'
      uses: taiki-e/install-action@nextest

    - if: inputs.test_data == 'true' || inputs.bindings == 'true'
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - if: inputs.test_data == 'true'
      run: |
        mkdir -p ~/.cache/ci-uzu/models
        ln -sf ~/.cache/ci-uzu/models workspace/models
        ./scripts/download_test_model.sh

        mkdir -p ~/.cache/ci-uzu/data/configs
        mkdir -p ~/.cache/ci-uzu/data/tokenizers
        ln -sf ~/.cache/ci-uzu/data/configs workspace/data/configs
        ln -sf ~/.cache/ci-uzu/data/tokenizers workspace/data/tokenizers
        cd ./tools/
        uv run export configs
        uv run export tokenizers
      shell: bash

    - if: inputs.bindings == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        registry-url: "https://registry.npmjs.org"

    - if: inputs.bindings == 'true'
      uses: pnpm/action-setup@v4
      with:
        version: 10.33.0
