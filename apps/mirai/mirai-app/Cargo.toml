[package]
name = "mirai-app"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "mirai-app"
path = "src/main.rs"

[dependencies]
# Local LLM inference engine (this repo). Metal backend only for now; grammar /
# structured-output (capability-grammar, a heavy C++ xgrammar build) is added
# later when needed.
uzu = { path = "../../../crates/uzu", default-features = false, features = ["backend-metal"] }

# GPUI UI framework + platform entry point + Tokio bridge, from the local Zed
# checkout. `font-kit` on gpui_platform is required for glyph rasterization.
gpui = { path = "../../../external/zed/crates/gpui" }
gpui_platform = { path = "../../../external/zed/crates/gpui_platform", features = ["font-kit"] }
gpui_tokio = { path = "../../../external/zed/crates/gpui_tokio" }
# HTTP client for loading remote provider-icon images via gpui's image cache.
reqwest_client = { path = "../../../external/zed/crates/reqwest_client" }

# Mirai design system (theme + reusable components), mirroring the structure of
# @trymirai-schemas/ui-kit. The app builds its UI from this crate.
ui-kit = { path = "../ui-kit" }

tokio = { version = "1", features = ["full"] }
futures = "0.3"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"
zip = { version = "2", default-features = false, features = ["deflate"] }
rfd = "0.15"
hound = "3.5.1"
reqwest = { version = "0.13.2", features = ["json"] }
# Embeds `assets/` (SVG icons) into the release binary so the shipped `.app`
# bundle is self-contained; reads from disk in debug builds for live reload.
rust-embed = "8"
# "Run on startup" — registers the bundled `.app` as a macOS login item.
auto-launch = "0.5"
# "Show in menu bar" — NSStatusItem + menu (GPUI has no status-item API).
tray-icon = "0.19"
# Decode the embedded menu-bar PNG to RGBA for the tray icon.
image = { version = "0.25", default-features = false, features = ["png"] }
