[workspace]

[package]
name = "wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
download-manager = { path = "../.." }
js-sys = "0.3"
tokio = { version = "1", features = ["sync"] }
kiban = { path = "../../../kiban" }
tokio-stream = "0.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console"] }